<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salesforce Standup - Flyout Selector</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --sf-blue-bg: #0b101e; 
            --sf-blue-main: #1589ee; 
            --sf-text: #e0e6ed;
            --list-bg: #162032;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--sf-blue-bg);
            color: var(--sf-text);
            margin: 0;
            padding: 20px;
            display: flex;
            height: 100vh;
            overflow: hidden;
            box-sizing: border-box;
        }

        /* -------------------------------------------
           CONFIGURATION PANEL (Left Sidebar)
        ------------------------------------------- */
        #configPanel {
            width: 320px;
            background-color: var(--list-bg);
            padding: 25px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        #configPanel h2 {
            margin-top: 0;
            color: var(--sf-blue-main);
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 2px solid rgba(21, 137, 238, 0.3);
            padding-bottom: 10px;
        }

        #nameInput {
            flex-grow: 1;
            background-color: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--sf-text);
            padding: 10px;
            border-radius: 6px;
            resize: none;
            font-family: monospace;
            margin-bottom: 15px;
        }

        button {
            background-color: var(--sf-blue-main);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 1px;
        }

        button:hover {
            background-color: #0070d2;
            box-shadow: 0 0 10px rgba(21, 137, 238, 0.5);
        }

        button:disabled {
            background-color: #444;
            cursor: not-allowed;
            opacity: 0.6;
        }

        /* -------------------------------------------
           MAIN STAGE (Center Screen)
        ------------------------------------------- */
        #mainStage {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end; 
            padding: 20px;
            position: relative;
        }

        #onDeckPreview {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 1.2rem;
            color: rgba(255,255,255,0.7);
            background: rgba(0,0,0,0.4);
            padding: 10px 15px;
            border-radius: 8px;
            display: none;
            border: 1px solid rgba(255,255,255,0.1);
            min-width: 150px;
            text-align: center;
        }

        #flyoutContainer {
            position: absolute;
            bottom: 150px; 
            transform-origin: bottom center; 
            opacity: 0; 
            display: none;
        }

        #theWinnerName {
            font-size: 7.5rem; 
            font-weight: bold;
            text-shadow: 0 0 30px rgba(255,255,255,0.7);
            color: #fff;
            white-space: nowrap; 
        }

        #spinPreview {
            font-size: 3rem;
            color: rgba(255,255,255,0.4);
            font-style: italic;
            position: absolute;
            bottom: 250px;
            display: none; 
        }

        @keyframes flyOut {
            0% {
                transform: translate(0, 0) scale(0.1) rotate(0deg);
                opacity: 1;
                display: flex; 
            }
            70% {
                transform: translate(0, -350px) scale(1.05) rotate(-10deg);
                opacity: 1;
            }
            100% {
                transform: translate(0, -320px) scale(1) rotate(0deg);
                opacity: 1;
                display: flex; 
            }
        }

        .flyout-animate {
            animation: flyOut 1.2s ease-out forwards;
            display: flex !important; 
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        /* The source object at the bottom */
        #sourceLogo {
            width: 450px; 
            margin-bottom: 10px;
            filter: drop-shadow(0 0 10px rgba(21, 137, 238, 0.4));
        }

        /* -------------------------------------------
           TRUMPET & NOTES ANIMATIONS
        ------------------------------------------- */
        .trumpet-container {
            display: flex;
            align-items: center;
            position: relative;
        }

        .trumpet {
            font-size: 5rem;
            display: inline-block;
        }

        .left-trumpet {
            transform: scaleX(-1); 
            animation: pulsateLeft 0.4s infinite alternate ease-in-out;
        }

        .right-trumpet {
            animation: pulsateRight 0.4s infinite alternate ease-in-out;
        }

        .notes {
            font-size: 3rem;
            position: absolute;
            opacity: 0;
        }

        .flyout-animate .notes.left-notes {
            left: 70px;
            animation: floatNotes 1.2s infinite ease-out;
        }

        .flyout-animate .notes.right-notes {
            right: 70px;
            animation: floatNotes 1.2s infinite ease-out 0.3s; 
        }

        @keyframes pulsateLeft {
            0% { transform: scaleX(-1) scale(1); }
            100% { transform: scaleX(-1) scale(1.2); }
        }

        @keyframes pulsateRight {
            0% { transform: scale(1); }
            100% { transform: scale(1.2); }
        }

        @keyframes floatNotes {
            0% { transform: translateY(10px) scale(0.8); opacity: 1; }
            100% { transform: translateY(-50px) scale(1.5); opacity: 0; }
        }

        /* -------------------------------------------
           TRACKING PANEL (Right Sidebar)
        ------------------------------------------- */
        #trackingPanel {
            width: 280px;
            background-color: var(--list-bg);
            padding: 25px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        #trackingPanel h3 {
            font-size: 1.1rem;
            color: var(--sf-blue-main);
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(21, 137, 238, 0.2);
            padding-bottom: 10px;
            margin-top: 0;
        }

        ul {
            list-style: none;
            padding: 0;
            overflow-y: auto;
            flex-grow: 1;
            margin-bottom: 20px;
        }

        li {
            padding: 8px 10px;
            margin-bottom: 5px;
            background-color: rgba(255,255,255,0.05);
            border-radius: 4px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
        }

        .waiting-list li {
            border-left: 4px solid var(--sf-blue-main);
        }

        .completed-list li {
            text-decoration: line-through;
            color: #888;
            border-left: 4px solid #04844b; 
        }

        .skip-btn {
            background: none;
            border: none;
            color: white;
            padding: 0 5px;
            margin-left: auto;
            cursor: pointer;
            font-size: 1rem;
            opacity: 0.5;
            transition: opacity 0.2s;
            text-transform: none;
        }

        .skip-btn:hover {
            opacity: 1;
            box-shadow: none;
            background: none;
        }

        #undoBtn {
            margin-top: 10px;
            background-color: #c23934; 
        }

        #undoBtn:hover {
            background-color: #a62a26;
        }

        #undoBtn:disabled {
            background-color: #444;
        }
    </style>
</head>
<body>

    <div id="configPanel">
        <h2>Roster Setup</h2>
        <textarea id="nameInput" placeholder="Paste names here... (one per line)">
Alex (Admin)
Brianna (BA)
Dan (Developer)
Sam (Support)
Chris (CPQ Specialist)</textarea>
        <button onclick="initializeRoster()">Initialize Roster</button>
    </div>

    <div id="mainStage">
        <div id="onDeckPreview">On Deck:<br><strong id="onDeckName"></strong></div>
        <div id="spinPreview">Searching...</div>

        <div id="flyoutContainer">
            <div class="trumpet-container">
                <span class="trumpet left-trumpet">🎺</span>
                <span class="notes left-notes">🎵</span>
            </div>
            
            <div id="theWinnerName">TEST NAME</div>
            
            <div class="trumpet-container">
                <span class="notes right-notes">🎶</span>
                <span class="trumpet right-trumpet">🎺</span>
            </div>
        </div>

        <img id="sourceLogo" src="logo.png" alt="NextGen Healthcare Logo">
    </div>

    <div id="trackingPanel">
        <h3>Waiting In Orbit (<span id="waitingCount">0</span>)</h3>
        <ul id="waitingList" class="waiting-list"></ul>

        <h3>Completed Release (<span id="completedCount">0</span>)</h3>
        <ul id="completedList" class="completed-list"></ul>

        <button id="pickBtn" onclick="initiatePick()" disabled>Randomize Next Pick</button>
        <button id="undoBtn" onclick="undoLastPick()" disabled>Undo Last Pick</button>
    </div>

    <script>
        // Core Logic State
        let waitingInOrbit = [];
        let completedRelease = [];
        let isSpinning = false;
        let trumpetConfettiInterval = null; 
        let nextWinnerIndex = null; 

        // DOM Elements
        const elInput = document.getElementById('nameInput');
        const elWaitingCount = document.getElementById('waitingCount');
        const elWaitingList = document.getElementById('waitingList');
        const elCompletedCount = document.getElementById('completedCount');
        const elCompletedList = document.getElementById('completedList');
        const elPickBtn = document.getElementById('pickBtn');
        const elFlyout = document.getElementById('flyoutContainer');
        const elWinnerName = document.getElementById('theWinnerName');
        const elSpinPreview = document.getElementById('spinPreview');
        const elOnDeckPreview = document.getElementById('onDeckPreview');
        const elOnDeckName = document.getElementById('onDeckName');
        const elUndoBtn = document.getElementById('undoBtn');

        // Feature 2: Load roster from local storage on load
        window.addEventListener('DOMContentLoaded', () => {
            const savedRoster = localStorage.getItem('sfStandupRoster');
            if (savedRoster) {
                elInput.value = savedRoster;
            }
        });

        /**
         * 1. Dynamic Setup: Reads and processes the text input.
         */
        function initializeRoster() {
            const rawText = elInput.value;
            // Feature 2: Save roster to local storage
            localStorage.setItem('sfStandupRoster', rawText);

            // Split by line break, remove whitespace, ignore empty lines
            waitingInOrbit = rawText.split('\n').map(name => name.trim()).filter(name => name.length > 0);
            completedRelease = [];
            
            if (waitingInOrbit.length === 0) {
                alert("Please add at least one name to the input roster.");
                return;
            }

            // Clear any active trumpet confetti
            if (trumpetConfettiInterval) {
                clearInterval(trumpetConfettiInterval);
                trumpetConfettiInterval = null;
            }

            // Set up initial On Deck
            nextWinnerIndex = Math.floor(Math.random() * waitingInOrbit.length);
            elOnDeckName.innerText = waitingInOrbit[nextWinnerIndex];
            elOnDeckPreview.style.display = 'block';

            // Reset UI state
            updateTrackingLists();
            elFlyout.style.display = 'none'; 
            elFlyout.classList.remove('flyout-animate');
            elSpinPreview.style.display = 'none';

            elPickBtn.disabled = false;
            elPickBtn.innerText = "Randomize Next Pick";
            elPickBtn.style.backgroundColor = "var(--sf-blue-main)";
            elUndoBtn.disabled = true;
        }

        /**
         * 2. Controlled Pick: Shift the spin to the On Deck area
         */
        function initiatePick() {
            if (isSpinning || waitingInOrbit.length === 0) return;

            // Clear any active trumpet confetti from the previous winner
            if (trumpetConfettiInterval) {
                clearInterval(trumpetConfettiInterval);
                trumpetConfettiInterval = null;
            }

            isSpinning = true;
            elPickBtn.disabled = true;
            elUndoBtn.disabled = true;
            elPickBtn.innerText = "Determining Next On Deck...";
            
            // Step A: Immediately hide the previous winner
            elFlyout.style.display = 'none';
            elFlyout.classList.remove('flyout-animate');
            
            // Force a small browser reflow so the CSS animation restarts cleanly
            void elFlyout.offsetWidth;

            // Step B: Lock in the current On Deck person as the Winner
            let actualWinningIndex = (nextWinnerIndex !== null && nextWinnerIndex < waitingInOrbit.length) 
                ? nextWinnerIndex 
                : Math.floor(Math.random() * waitingInOrbit.length);
                
            const winner = waitingInOrbit[actualWinningIndex];

            // Set final name and start FLYOUT animation immediately
            elWinnerName.innerText = winner;
            elFlyout.classList.add('flyout-animate');

            // Move arrays
            waitingInOrbit.splice(actualWinningIndex, 1);
            completedRelease.push(winner);
            updateTrackingLists();

            // Fire Confetti for the Winner immediately
            fireConfetti();
            trumpetConfettiInterval = setInterval(fireTrumpetConfetti, 3000);

            // Step C: Spin for the NEXT On Deck person inside the preview box
            if (waitingInOrbit.length > 0) {
                elOnDeckPreview.style.display = 'block';
                elOnDeckName.style.fontStyle = 'italic';
                elOnDeckName.style.opacity = '0.7';

                let rapidInterval = setInterval(() => {
                    let randomVisualIndex = Math.floor(Math.random() * waitingInOrbit.length);
                    elOnDeckName.innerText = waitingInOrbit[randomVisualIndex];
                }, 80);

                // Lock in the new On Deck person after 1.5s
                setTimeout(() => {
                    clearInterval(rapidInterval);
                    elOnDeckName.style.fontStyle = 'normal';
                    elOnDeckName.style.opacity = '1';
                    
                    nextWinnerIndex = Math.floor(Math.random() * waitingInOrbit.length);
                    elOnDeckName.innerText = waitingInOrbit[nextWinnerIndex];
                    
                    finishSpinCycle();
                }, 1500);
            } else {
                // No one left for On Deck
                nextWinnerIndex = null;
                elOnDeckPreview.style.display = 'none';
                finishSpinCycle();
            }
        }

        /**
         * Helper function to reset UI after the On Deck spin completes
         */
        function finishSpinCycle() {
            isSpinning = false;
            elUndoBtn.disabled = false;

            if (waitingInOrbit.length > 0) {
                elPickBtn.disabled = false;
                elPickBtn.innerText = "Randomize Next Pick";
            } else {
                elPickBtn.disabled = true;
                elPickBtn.innerText = "Standup Complete!";
                elPickBtn.style.backgroundColor = "#04844b"; // Green
                
                // Final burst
                setTimeout(fireConfetti, 500);
            }
        }

        /**
         * Re-renders the two tracking columns on the right panel.
         */
        function updateTrackingLists() {
            elWaitingCount.innerText = waitingInOrbit.length;
            elCompletedCount.innerText = completedRelease.length;

            elWaitingList.innerHTML = '';
            waitingInOrbit.forEach((name, index) => {
                const li = document.createElement('li');
                li.innerText = name;

                // Feature 4: Add Skip Button
                const skipBtn = document.createElement('button');
                skipBtn.innerText = '⏭️';
                skipBtn.className = 'skip-btn';
                skipBtn.title = 'Mark Absent / Skip';
                skipBtn.onclick = () => skipPerson(index);
                li.appendChild(skipBtn);

                elWaitingList.appendChild(li);
            });

            elCompletedList.innerHTML = '';
            completedRelease.forEach(name => {
                const li = document.createElement('li');
                li.innerText = name;
                elCompletedList.appendChild(li);
            });
        }

        /**
         * Feature 4: Skips a person inline
         */
        function skipPerson(index) {
            if (isSpinning) return;

            // Adjust the nextWinnerIndex if needed before removing
            if (index === nextWinnerIndex) {
                nextWinnerIndex = null; 
            } else if (nextWinnerIndex !== null && index < nextWinnerIndex) {
                nextWinnerIndex--; 
            }

            waitingInOrbit.splice(index, 1);

            // Recalculate On Deck
            if (nextWinnerIndex === null && waitingInOrbit.length > 0) {
                nextWinnerIndex = Math.floor(Math.random() * waitingInOrbit.length);
            }

            if (waitingInOrbit.length > 0) {
                elOnDeckName.innerText = waitingInOrbit[nextWinnerIndex];
                elOnDeckPreview.style.display = 'block';
            } else {
                elOnDeckPreview.style.display = 'none';
                if (completedRelease.length > 0) {
                    elPickBtn.disabled = true;
                    elPickBtn.innerText = "Standup Complete!";
                    elPickBtn.style.backgroundColor = "#04844b";
                } else {
                    elPickBtn.disabled = true; 
                }
            }

            updateTrackingLists();
        }

        /**
         * Feature 5: Undo last pick
         */
        function undoLastPick() {
            if (completedRelease.length === 0 || isSpinning) return;

            const lastPerson = completedRelease.pop();
            waitingInOrbit.push(lastPerson);

            // Stop current confetti
            if (trumpetConfettiInterval) {
                clearInterval(trumpetConfettiInterval);
                trumpetConfettiInterval = null;
            }
            elFlyout.style.display = 'none';
            elFlyout.classList.remove('flyout-animate');

            elUndoBtn.disabled = true; 
            
            // Reset main button
            elPickBtn.disabled = false;
            elPickBtn.innerText = "Randomize Next Pick";
            elPickBtn.style.backgroundColor = "var(--sf-blue-main)";

            // Pick a new On Deck person 
            nextWinnerIndex = Math.floor(Math.random() * waitingInOrbit.length);
            elOnDeckName.innerText = waitingInOrbit[nextWinnerIndex];
            elOnDeckPreview.style.display = 'block';

            updateTrackingLists();
        }

        /**
         * Utility function for the main screen-wide burst
         */
        function fireConfetti() {
            // Primary Burst
            confetti({
                particleCount: 250, 
                spread: 120,
                origin: { y: 0.6 }, 
                colors: ['#1589ee', '#fff', '#04844b', '#ffb75d'], 
                shapes: ['circle', 'square']
            });
            
            // Secondary Delayed Burst
            setTimeout(() => {
                confetti({
                    particleCount: 150,
                    spread: 100,
                    origin: { y: 0.5 }, 
                    colors: ['#1589ee', '#fff', '#04844b', '#ffb75d'], 
                    shapes: ['circle', 'square']
                });
            }, 300);
        }

        /**
         * Calculates trumpet coordinates and fires confetti directly from them
         */
        function fireTrumpetConfetti() {
            const leftTrumpet = document.querySelector('.left-trumpet');
            const rightTrumpet = document.querySelector('.right-trumpet');

            if (leftTrumpet && rightTrumpet && elFlyout.style.display !== 'none') {
                const leftRect = leftTrumpet.getBoundingClientRect();
                const rightRect = rightTrumpet.getBoundingClientRect();

                // Convert pixel coordinates to percentage for canvas-confetti
                const leftX = (leftRect.left + leftRect.width / 2) / window.innerWidth;
                const leftY = (leftRect.top + leftRect.height / 2) / window.innerHeight;

                const rightX = (rightRect.left + rightRect.width / 2) / window.innerWidth;
                const rightY = (rightRect.top + rightRect.height / 2) / window.innerHeight;

                // Left Trumpet (Shooting Up and Right)
                confetti({
                    particleCount: 40,
                    angle: 60,
                    spread: 45,
                    origin: { x: leftX, y: leftY },
                    colors: ['#1589ee', '#fff', '#ffb75d']
                });

                // Right Trumpet (Shooting Up and Left)
                confetti({
                    particleCount: 40,
                    angle: 120, 
                    spread: 45,
                    origin: { x: rightX, y: rightY },
                    colors: ['#1589ee', '#fff', '#04844b']
                });
            }
        }
    </script>
</body>
</html>
